services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: buytrack
      POSTGRES_PASSWORD: buytrack
      POSTGRES_DB: buytrack
    # 預設不對主機發布 5432（僅 Docker 內部網路可連）。
    # 若臨時要用 DB 管理器連入，再加：
    #   ports:
    #     - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buytrack"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # 一次性：建立資料表
  initdb:
    build: .
    command: python -m app.init_db
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  bot:
    build: .
    command: python -m app.bot
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: .
    command: celery -A app.celery_app.celery_app worker --loglevel=info --concurrency=4
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # 目錄爬取專用 worker（獨立 queue，長時間爬取不影響單品檢查）
  catalog-worker:
    build: .
    command: celery -A app.celery_app.celery_app worker -Q catalog --loglevel=info --concurrency=1
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  beat:
    build: .
    command: celery -A app.celery_app.celery_app beat --loglevel=info
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
